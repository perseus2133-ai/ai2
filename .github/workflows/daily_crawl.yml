name: 📊 Daily Stock Crawl

on:
  schedule:
    # 매일 오전 1시 KST (= 16:00 UTC 전날)
    - cron: '0 16 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (GitHub Actions 탭에서 직접 실행 가능)
    inputs:
      reason:
        description: '수동 실행 사유'
        required: false
        default: '수동 크롤링'

permissions:
  contents: write

# Node.js 20 deprecation 대응: 액션들을 Node.js 24로 강제 실행
# (2026-06-16부터 GitHub이 자동 전환 예정 - 미리 opt-in)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 140  # FnGuide 동시성 세마포어(8)로 크롤 ~87분 소요 → 느린 날 여유 확보

    steps:
      - name: ⬇️ 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy

      - name: 🔄 크롤링 실행
        run: python crawl_script.py

      # 모의투자: 매일 평가액 기록 + 7일 경과 시 주간 리밸런싱
      # (fresh CSV 기반, 결과는 data/paper_trading/ → 아래 push에 포함)
      - name: 💰 모의투자 평가/리밸런싱
        run: python paper_trading.py --auto

      - name: 💾 데이터 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 변경사항 없으면 exit 0 (에러 없이 종료)
          git diff --staged --quiet && echo "변경사항 없음" && exit 0
          git commit -m "🤖 Auto crawl: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push

      # AI 데일리 3선 카톡 전송 (시크릿 미설정이면 자동 건너뜀, 실패해도 크롤 무관)
      - name: 📨 카카오톡 알림 (AI 3선)
        continue-on-error: true
        env:
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python kakao_send.py

      # push 이후에 실행: 데이터는 이미 안전하게 커밋된 상태에서,
      # FnGuide fresh 27/28E가 0건이면 run을 실패 처리 → GitHub이
      # 소유자에게 실패 메일을 자동 발송 (주소 변경/개편을 당일 인지)
      - name: 🩺 FnGuide 헬스체크 (이상 시 run 실패 → 메일 알림)
        run: python check_fnguide_health.py
